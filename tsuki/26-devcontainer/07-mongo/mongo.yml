services:
  mongo:
    image: mongo
    container_name: mongo
    volumes:
    - ./data:/data/db
    ports:
    - 27017:27017
    restart: always

# unauthenticated by design: mongosh mongodb://127.0.0.1:27017
# enable auth: environment: MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD
# docker-compose -f $PWD/mongo.yml up -d
