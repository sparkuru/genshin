services:
  redis:
    image: redis:alpine
    container_name: redis
    command: ["redis-server", "--protected-mode", "no", "--save", ""]
    volumes:
    - ./data:/data
    ports:
    - 6379:6379
    restart: always

# unauthenticated by design: redis-cli -h 127.0.0.1
# set a password instead: command: ["redis-server", "--requirepass", "yourpass"]
# docker-compose -f $PWD/redis.yml up -d
