services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
    - ./html:/usr/share/nginx/html:ro
    # - ./conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
    - 8080:80
    restart: always

