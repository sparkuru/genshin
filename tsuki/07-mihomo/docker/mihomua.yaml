services:
  mihomua:
    image: mihomua:v1
    container_name: mihomua
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=Asia/Shanghai
      - WEB_PORT=7894
    ports:
      - "1080:1080" # set your port here
      - "7893:7893" # set your external controller port here
      - "7894:7894"
    volumes:
      - ./config:/root/.config/mihomo
    restart: always

  mihomua-bypass:
    build: ./bypass
    image: mihomua-bypass:v1
    container_name: mihomua-bypass
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - WAN_IFACE=vmbr0          # adjust to your host's WAN/LAN-facing iface
      - TUN_IFACE=paimon         # mihomo tun.device name in mihomo config file
      - MARK=0x100/0x100
      - RULE_PREF=8500           # must be < mihomo auto-route's pref (9002)
    depends_on:
      - mihomua
    restart: unless-stopped

networks:
  default:
    name: mihomua-network
